# LUCID System Configuration
# Lakebase-Unified Context-aware Intelligence for Data

server:
  host: "0.0.0.0"
  port: 19001
  mode: "debug"  # debug | release

# LLM configuration - loads from llm_config.json
# Available models: deepseek_v3, deepseek_v3_2, qwen_max, qwen3_max, ali_deepseek_v3_2
llm:
  config_file: "llm_config.json"
  default_model: "deepseek_v3"  # Override via LLM_DEFAULT_MODEL env var

# Lake-Base storage (MariaDB with VECTOR + HNSW)
# All demo and production databases are in this single instance
lakebase:
  host: "lucid-mariadb"
  port: 3306
  user: "lucid"
  password: "lucid2024"
  database: "lucid"

# Demo databases (all in MariaDB)
databases:
  # Spider TVShow
  - id: "spider_tvshow"
    name: "Spider TVShow"
    type: "mysql"
    host: "lucid-mariadb"
    port: 3306
    user: "root"
    password: "lucid_root_2024"
    database: "spider_tvshow"
    description: "TV show & channel queries — inference pipeline demo"

  # Spider Flight
  - id: "spider_flight"
    name: "Spider Flight"
    type: "mysql"
    host: "lucid-mariadb"
    port: 3306
    user: "root"
    password: "lucid_root_2024"
    database: "spider_flight"
    description: "Airport & flight queries — multi-table join demo"

  # Spider WTA Tennis
  - id: "spider_wta"
    name: "Spider WTA"
    type: "mysql"
    host: "lucid-mariadb"
    port: 3306
    user: "root"
    password: "lucid_root_2024"
    database: "spider_wta"
    description: "WTA tennis rankings & matches — complex schema demo (8 tables)"

  # Evolution Demo
  - id: "lucid_evolution"
    name: "Lucid Evolution"
    type: "mysql"
    host: "lucid-mariadb"
    port: 3306
    user: "lucid"
    password: "lucid2024"
    database: "lucid_evolution"
    description: "Agent self-maintenance — 5-stage DDL evolution demo"

  # TPC-H Enterprise (38-table large-scale demo)
  - id: "tpch_enterprise"
    name: "TPC-H Enterprise"
    type: "mysql"
    host: "lucid-mariadb"
    port: 3306
    user: "lucid"
    password: "lucid2024"
    database: "tpch_enterprise"
    description: "TPC-H Enterprise — 38-table large-scale two-stage schema linking demo"

react:
  max_iterations: 5
  enable_rich_context: true

