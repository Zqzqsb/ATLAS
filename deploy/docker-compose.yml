# LUCID - Full Stack Docker Compose
# Lakebase-Unified Context-aware Intelligence for Data
#
# One-command deployment:
#   docker compose -f deploy/docker-compose.yml up -d
#
# Access:
#   Frontend: http://localhost:19000
#   Backend API: http://localhost:19001
#
# Port allocation:
#   19000 - Frontend (Web UI)
#   19001 - Backend (REST API + SSE)
#   19010 - MariaDB (Lake-Base + Demo Databases)

services:
  # ============================================================
  # Frontend - Vue3 + Vite + Naive UI
  # ============================================================
  frontend:
    image: lucid-frontend:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: lucid-frontend
    restart: unless-stopped
    ports:
      - "${LUCID_FRONTEND_PORT:-19000}:80"
    environment:
      - BACKEND_URL=http://lucid-backend:19001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lucid-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Backend - Go API Server
  # ============================================================
  backend:
    image: lucid-backend:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: lucid-backend
    restart: unless-stopped
    ports:
      - "${LUCID_BACKEND_PORT:-19001}:19001"
    environment:
      - GIN_MODE=release
      - SERVER_PORT=19001
      - SERVER_MODE=${SERVER_MODE:-debug}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LLM_CONFIG_PATH=/app/llm_config.json
      - LLM_API_KEY=${LLM_API_KEY:-}
      - GODEBUG=madvdontneed=1
      - GOMAXPROCS=2
    volumes:
      # Configuration
      - ../backend/server/configs:/app/configs:ro
      - ../llm_config.json:/app/llm_config.json:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - lucid-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:19001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ============================================================
  # MariaDB - Lake-Base Storage + Demo Databases
  # Single database instance for both lake-base and demonstrations
  # ============================================================
  mariadb:
    image: mariadb:12
    container_name: lucid-mariadb
    restart: unless-stopped
    ports:
      - "${LUCID_MARIADB_PORT:-19010}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: lucid_root_2024
      MARIADB_DATABASE: lucid
      MARIADB_USER: lucid
      MARIADB_PASSWORD: lucid2024
      TZ: UTC
    volumes:
      - lucid-mariadb-data:/var/lib/mysql
      - ./init/mariadb:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - lucid-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ============================================================
# Volumes
# ============================================================
volumes:
  lucid-mariadb-data:
    name: lucid-mariadb-data

# ============================================================
# Networks
# ============================================================
networks:
  lucid-network:
    name: lucid-network
    driver: bridge
