# ATLAS - Full Stack Docker Compose
# Adaptive Text-to-SQL with Lifecycle-Aware Self-maintaining Context
#
# One-command deployment:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose -f deploy/docker-compose.yml up -d
#
# Access:
#   Frontend: http://localhost:19000
#   Backend API: http://localhost:19001
#
# Port allocation:
#   19000 - Frontend (Web UI)
#   19001 - Backend (REST API + SSE)
#   19010 - MariaDB (Lake-Base + Demo Databases)

services:
  # ============================================================
  # Frontend - Vue3 + Vite + Naive UI
  # ============================================================
  frontend:
    image: atlas-frontend:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: atlas-frontend
    restart: unless-stopped
    ports:
      - "${ATLAS_FRONTEND_PORT:-19000}:80"
    environment:
      - BACKEND_URL=http://atlas-backend:19001
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Backend - Go API Server
  # ============================================================
  backend:
    image: atlas-backend:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: atlas-backend
    restart: unless-stopped
    ports:
      - "${ATLAS_BACKEND_PORT:-19001}:19001"
    environment:
      - GIN_MODE=release
      - SERVER_PORT=19001
      - SERVER_MODE=${SERVER_MODE:-debug}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LLM_CONFIG_PATH=/app/llm_config.json
      - LLM_API_KEY=${LLM_API_KEY:-}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-atlas_root_2024}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD:-atlas2024}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - GODEBUG=madvdontneed=1
      - GOMAXPROCS=2
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      # Configuration
      - ../backend/server/configs:/app/configs:ro
      - ../llm_config.json:/app/llm_config.json:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:19001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ============================================================
  # MariaDB - Lake-Base Storage + Demo Databases
  # Single database instance for both lake-base and demonstrations
  # ============================================================
  mariadb:
    image: mariadb:12
    container_name: atlas-mariadb
    restart: unless-stopped
    ports:
      - "${ATLAS_MARIADB_PORT:-19010}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-atlas_root_2024}
      MARIADB_DATABASE: atlas
      MARIADB_USER: atlas
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-atlas2024}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - atlas-mariadb-data:/var/lib/mysql
      - ./init/mariadb:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ============================================================
# Volumes
# ============================================================
volumes:
  atlas-mariadb-data:
    name: atlas-mariadb-data

# ============================================================
# Networks
# ============================================================
networks:
  atlas-network:
    name: atlas-network
    driver: bridge
