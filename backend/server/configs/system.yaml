# LUCID System Configuration
# Lakebase-Unified Context-aware Intelligence for Data

server:
  host: "0.0.0.0"
  port: 19001
  mode: "debug"  # debug | release

# LLM configuration - loads from llm_config.json
# Available models: deepseek_v3, deepseek_v3_2, qwen_max, qwen3_max, ali_deepseek_v3_2
llm:
  config_file: "llm_config.json"
  default_model: "deepseek_v3"  # Override via LLM_DEFAULT_MODEL env var

# Lake-Base storage (MariaDB with VECTOR + HNSW)
# All demo and production databases are in this single instance
lakebase:
  host: "lucid-mariadb"
  port: 3306
  user: "lucid"
  password: "lucid2024"
  database: "lucid"

# Demo databases (all in MariaDB)
databases:
  # Spider TVShow
  - id: "spider_tvshow"
    name: "Spider TVShow"
    type: "mysql"
    host: "lucid-mariadb"
    port: 3306
    user: "root"
    password: "lucid_root_2024"
    database: "spider_tvshow"

  # Spider Flight
  - id: "spider_flight"
    name: "Spider Flight"
    type: "mysql"
    host: "lucid-mariadb"
    port: 3306
    user: "root"
    password: "lucid_root_2024"
    database: "spider_flight"

  # Spider WTA Tennis
  - id: "spider_wta"
    name: "Spider WTA"
    type: "mysql"
    host: "lucid-mariadb"
    port: 3306
    user: "root"
    password: "lucid_root_2024"
    database: "spider_wta"

react:
  max_iterations: 5
  enable_rich_context: true

